# Contrôle de saisie pour Disponibilite et RendezVous (hors entités, hors JS)
# https://symfony.com/doc/current/validation.html

App\Entity\Disponibilite:
  constraints:
    - Callback:
        callback: [App\Validator\DisponibiliteValidator, 'validate']
  properties:
    date:
      - NotNull:
          message: "La date est obligatoire."
    heureDebut:
      - NotNull:
          message: "L'heure de début est obligatoire."
    heureFin:
      - NotNull:
          message: "L'heure de fin est obligatoire."
    status:
      - NotBlank: ~
      - Choice:
          choices: [libre, reservee, annulee]
          message: "Statut invalide."

App\Entity\RendezVous:
  properties:
    disponibilite:
      - NotNull:
          message: "La disponibilité est obligatoire."
    dateHeure:
      - NotNull:
          message: "La date et l'heure sont obligatoires."
    statut:
      - NotBlank: ~
      - Choice:
          choices: [en_attente, confirme, annule, termine]
          message: "Statut invalide."
    motif:
      - Length:
          max: 5000
          maxMessage: "Le motif ne doit pas dépasser {{ limit }} caractères."
